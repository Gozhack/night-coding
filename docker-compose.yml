services:
  openclaw-agent:
    build: .
    container_name: openclaw_sandbox
    command: node openclaw.mjs gateway --allow-unconfigured --password ${OPENCLAW_PASSWORD:-sandbox}
    environment:
      # IMPORTANTE: esta key DEBE ser de un proyecto SIN billing (free tier de AI Studio).
      # La usa SOLO el cerebro de Chappie (OpenClaw) con gemini-2.5-flash. Si topa el rate
      # limit da 429 (falla seguro), nunca cobra mientras el proyecto no tenga billing.
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - OPENCLAW_GATEWAY_MODE=local
      - OPENCLAW_GATEWAY_BIND=127.0.0.1
      - OPENCLAW_PLUGINS_OPENAI_ENABLED=false
      - OPENCLAW_PROVIDERS_GOOGLE_DEFAULT_MODEL=google/gemini-2.5-flash
      # El Gemini CLI en modo headless no corre herramientas en un folder "no confiable".
      # Marcamos /workspace como confiable de forma global para que las delegaciones
      # de Chappie al CLI no fallen con "not running in a trusted directory".
      - GEMINI_CLI_TRUST_WORKSPACE=true
    volumes:
      - ./workspace:/workspace
      # Persiste el login OAuth del Gemini CLI (free tier). Login una sola vez; aquí queda.
      - ./.gemini_cli:/root/.gemini
      - ./.openclaw_config/SOUL.md:/root/.openclaw/workspace/SOUL.md
      - ./.openclaw_config/IDENTITY.md:/root/.openclaw/workspace/IDENTITY.md
      - ./.openclaw_config/AGENTS.md:/root/.openclaw/workspace/AGENTS.md
      - ./.openclaw_config/openclaw.json:/root/.openclaw/openclaw.json
    restart: unless-stopped
