name: CD
on:
  push:
    branches:
      - master

jobs:
  export-web:
    name: Export HTML5 and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          unzip Godot_v4.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.3.stable/
          rm -f Godot_v4.3-stable_export_templates.tpz

      - name: Export Games
        shell: bash
        run: |
          # Auto-descubre cada juego (workspace/<juego>/project.godot) y exporta el preset "Web"
          shopt -s nullglob
          for dir in workspace/*/; do
            game=$(basename "$dir")
            [ -f "${dir}project.godot" ] || continue
            echo "::group::Export $game"
            mkdir -p "$GITHUB_WORKSPACE/build/web/$game"
            # Import primero (genera .godot/) con ruta ABSOLUTA
            godot --headless --path "$GITHUB_WORKSPACE/$dir" --quit 2>&1 | tail -5 || true
            # Exporta el preset Web con ruta ABSOLUTA
            godot --headless --path "$GITHUB_WORKSPACE/$dir" --export-release "Web" "$GITHUB_WORKSPACE/build/web/$game/index.html"
            echo "::endgroup::"
          done
          echo "=== Juegos exportados ==="; ls -R build/web

      - name: Create Landing Page
        run: |
          cp web-hub/index.html build/web/index.html
          # Add a .nojekyll file to ensure GitHub Pages doesn't ignore files starting with underscores (Godot needs this)
          touch build/web/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages

      # Avisa por Telegram al terminar. El token y el chat ID viven en GitHub Secrets
      # (el repo es PÚBLICO, así que NO van en el workflow). Si faltan, el paso se salta.
      - name: Notify Telegram (success)
        if: success()
        continue-on-error: true
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "Telegram secrets no configurados — saltando notificación."
            exit 0
          fi
          SUBJECT=$(printf '%s\n' "$COMMIT_MSG" | head -1)
          TEXT=$(printf '🚀 Deploy OK — night-coding\n%s\nhttps://gozhack.github.io/night-coding/' "$SUBJECT")
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d disable_web_page_preview=true \
            --data-urlencode "text=${TEXT}" > /dev/null || true
          echo "Notificación de éxito enviada."

      - name: Notify Telegram (failure)
        if: failure()
        continue-on-error: true
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            exit 0
          fi
          SUBJECT=$(printf '%s\n' "$COMMIT_MSG" | head -1)
          TEXT=$(printf '❌ Deploy FALLÓ — night-coding\n%s\nRevisa: https://github.com/Gozhack/night-coding/actions' "$SUBJECT")
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            -d disable_web_page_preview=true \
            --data-urlencode "text=${TEXT}" > /dev/null || true
