name: CD
on:
  push:
    branches:
      - master

jobs:
  export-web:
    name: Export HTML5 and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          unzip Godot_v4.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.3.stable/
          rm -f Godot_v4.3-stable_export_templates.tpz

      - name: Export Games
        run: |
          # Auto-descubre cada juego (workspace/<juego>/project.godot) y exporta el preset "Web"
          shopt -s nullglob
          for dir in workspace/*/; do
            game=$(basename "$dir")
            [ -f "${dir}project.godot" ] || continue
            echo "::group::Export $game"
            mkdir -p "$GITHUB_WORKSPACE/build/web/$game"
            # Import primero (genera .godot/) con ruta ABSOLUTA
            godot --headless --path "$GITHUB_WORKSPACE/$dir" --quit 2>&1 | tail -5 || true
            # Exporta el preset Web con ruta ABSOLUTA
            godot --headless --path "$GITHUB_WORKSPACE/$dir" --export-release "Web" "$GITHUB_WORKSPACE/build/web/$game/index.html"
            echo "::endgroup::"
          done
          echo "=== Juegos exportados ==="; ls -R build/web

      - name: Create Landing Page
        run: |
          cp web-hub/index.html build/web/index.html
          # Add a .nojekyll file to ensure GitHub Pages doesn't ignore files starting with underscores (Godot needs this)
          touch build/web/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
