name: CD
on:
  push:
    branches:
      - master

jobs:
  export-web:
    name: Export HTML5 and Deploy
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export
        run: |
          mkdir -p build/web
          # Importation and setup (headless)
          godot --headless --path workspace --editor --quit
          # Export to HTML5
          godot --headless --path workspace --export-release "Web" ../build/web/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
