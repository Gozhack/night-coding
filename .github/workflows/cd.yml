name: CD
on:
  push:
    branches:
      - master

jobs:
  export-web:
    name: Export HTML5 and Deploy
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          unzip Godot_v4.3-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/4.3.stable/
          rm -f Godot_v4.3-stable_export_templates.tpz

      - name: Export
        run: |
          mkdir -p build/web
          # Importation and setup (headless)
          godot --headless --path workspace --editor --quit
          # Export to HTML5
          godot --headless --path workspace --export-release "Web" ../build/web/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
