name: CD
on:
  push:
    branches:
      - master

jobs:
  export-web:
    name: Export HTML5 and Deploy
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:mono-4.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Export
        run: |
          mkdir -p build/web
          # Importation and setup (headless)
          godot --headless --path workspace -e --quit
          # Export to HTML5 (preset must be defined in export_presets.cfg)
          # For now, we ensure the directory exists and notify if preset is missing
          godot --headless --path workspace --export-release "Web" ../build/web/index.html || echo "Export preset 'Web' not found. Please create it in Godot Editor."

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
