name: CI
on:
  push:
    branches-ignore:
      - master

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:mono-4.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore workspace/*.csproj

      - name: Build
        run: dotnet build workspace/*.csproj -c Release
